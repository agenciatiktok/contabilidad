  Repo    : https://github.com/agenciatiktok/contabilidad
  URL     : https://agenciatiktok.github.io/contabilidad/incentivos.html

  HISTORIAL DE CAMBIOS
  ─────────────────────────────────────────────────────────────────────────────
  v1 · 12/03/2026
      - Versión inicial
      - Carga usuarios desde usuarios_tiktok (cumple=true, fecha_datos=periodo)
      - Calcula incentivos cruzando diamantes con incentivos_horizontales
      - Respeta nivel1_tabla3 de tabla contratos
      - Guarda pagos en tabla pagos_incentivos (upsert por periodo+usuario_id)
      - Marcar pagado individual con monto editable y nota
      - Deshacer pago individual
      - Filtros: Todos / Pendientes / Pagados

  v2 · 12/03/2026
      - Rediseño: fondo gris claro, texto negro (accesibilidad)

  v3 · 12/03/2026
      - Rediseño final: fondo #1a1a1a, texto #d8d8d8 (preferencia usuario)
      - Selector de contrato — filtra tabla y stats por contrato
      - Barra de contrato con info resumida al seleccionar uno
      - Botón "Pagar contrato completo" — marca todos los pendientes de un click
      - Botón "Registrar sueldo" — anota pago de sueldo del agente por separado
        (se guarda con usuario_id = SUELDO_AXXX para distinguirlo)
      - Tabla ordenada por contrato, luego pendientes primero, luego monto desc

  v4 · 13/03/2026
      - Barra de contrato muestra total_final del agente desde resumen_contratos
        (informativo, no afecta lógica de pagos individuales)
      - Muestra transferencias_recibidas si las hay

  v5 · 13/03/2026
      - Texto de barra de contrato más claro y grande (legibilidad)

  v6 · 13/03/2026
      - Botón "→ Agente" por jugador: redirige incentivo al agente en vez de pago directo
      - Fila con fondo azul tenue cuando está redirigida al agente
      - Barra del contrato muestra: Agente: $XX sueldo + $YY redirigido = $ZZ total
      - Botón "Exportar nota .txt" — aparece solo si hay redirecciones activas
      - Exporta nota con sueldo + redirigidos + pagos directos + total Angel desembolsa
      - IDs_SIN_TOGGLE: excluye botón → Agente para IDs especiales del MAESTRO V10
        (la.consentida A051, leoncitaaly A031, yaze_ortiz A047)
      - Columna nueva en pagos_incentivos: redirigido_agente boolean default false
      - SQL necesario: ALTER TABLE pagos_incentivos ADD COLUMN IF NOT EXISTS
        redirigido_agente boolean DEFAULT false;

  TABLAS SUPABASE UTILIZADAS
  ─────────────────────────────────────────────────────────────────────────────
  READ   : usuarios_tiktok        — streamers que cumplen por periodo
  READ   : incentivos_horizontales — tabla de montos por nivel y diamantes
  READ   : contratos              — para verificar nivel1_tabla3
  READ   : reportes_contratos     — fallback para nombres históricos
  READ   : resumen_contratos      — total del agente por contrato/periodo
  WRITE  : pagos_incentivos       — registro de pagos (creada 12/03/2026)
                                    columna redirigido_agente añadida 13/03/2026

  NOTAS
  ─────────────────────────────────────────────────────────────────────────────
  - Requiere servidor HTTP para funcionar (no abre directo desde disco)
  - Usar: python -m http.server 8080  →  http://localhost:8080/incentivos.html
  - O subir a GitHub Pages: https://agenciatiktok.github.io/contabilidad/

<script>
const SUPABASE_URL='https://lequmcmudzzilxlessoz.supabase.co';
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlcXVtY211ZHp6aWx4bGVzc296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkxMjkxMzIsImV4cCI6MjA3NDcwNTEzMn0.iTWmbHgkmWLGGUhT0pdN_FtaE0S4J9ZWXKyRD3m8FFM';
const H={'apikey':ANON_KEY,'Authorization':`Bearer ${ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};
const PERIODOS=['2026-02-28','2026-01-31','2025-12-31','2025-11-30','2025-10-31','2025-09-30'];

// IDs con acuerdos especiales donde el jugador ES el agente (o tiene incentivo ya integrado en sueldo)
// Fuente: MAESTRO V10, sección 10. No modificar sin autorización de Angel.
// 7390166396623274001 = la.consentida.d.papa (A051) — su incentivo está integrado en sueldo via ×2
// 7359138566456475653 = leoncitaaly (A031) — excepción HIBRIDO_MEVAK
// 7566056336362881040 = yaze_ortiz (A047) — sueldo $0, solo incentivo tabla
const IDS_SIN_TOGGLE=new Set(['7390166396623274001','7359138566456475653','7566056336362881040']);

let currentPeriodo='',currentContrato='',allRows=[],pagosMap={},sueldosMap={};
let incentivosTable=[],contratosMap={},currentFilter='all',modalRow=null,modalMode='individual';

async function sbGet(p){const r=await fetch(`${SUPABASE_URL}/rest/v1/${p}`,{headers:H});if(!r.ok)throw new Error(`Error ${r.status}`);return r.json();}
async function sbUpsert(t,d){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(`Error ${r.status}`);return r.json();}
async function sbPatch(t,id,d){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify(d)});if(!r.ok)throw new Error(`Error ${r.status}`);return r.json();}

window.addEventListener('DOMContentLoaded',async()=>{
  const ps=document.getElementById('periodSelect');
  PERIODOS.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});
  ps.addEventListener('change',e=>{currentPeriodo=e.target.value;currentPeriodo?loadData():showMsg('Selecciona un periodo para comenzar.');});
  document.getElementById('contratoSelect').addEventListener('change',async e=>{currentContrato=e.target.value;await updateContratoBar();updateStats();renderTable();});
  document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.getElementById('modalSueldoOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModalSueldo();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeModalSueldo();}});
  await loadStaticTables();
});

async function loadStaticTables(){
  try{
    incentivosTable=await sbGet('incentivos_horizontales?select=*&order=acumulado.asc');
    const c=await sbGet('contratos?select=codigo,nivel1_tabla3,nombre');
    c.forEach(r=>{contratosMap[r.codigo]=r;});
  }catch(e){console.error('Tablas estáticas:',e);}
}

async function loadData(){
  if(!currentPeriodo)return;
  showMsg('Cargando...');spinRefresh(true);
  try{
    const usuarios=await sbGet(`usuarios_tiktok?fecha_datos=eq.${currentPeriodo}&cumple=eq.true&select=id_tiktok,usuario,agencia,diamantes,nivel,contrato,agente`);
    const pagos=await sbGet(`pagos_incentivos?periodo=eq.${currentPeriodo}&select=*`);
    pagosMap={};sueldosMap={};
    pagos.forEach(p=>{
      if(p.usuario_id&&p.usuario_id.startsWith('SUELDO_'))sueldosMap[p.contrato]=p;
      else pagosMap[p.usuario_id]=p;
    });
    const sinN=usuarios.filter(u=>!u.usuario||u.usuario.trim()===''||u.usuario==='nan');
    const histMap={};
    if(sinN.length>0){
      try{
        const ids=sinN.map(u=>u.id_tiktok).join(',');
        const hist=await sbGet(`reportes_contratos?usuario_id=in.(${ids})&usuario=not.eq.&select=usuario_id,usuario&limit=300`);
        hist.forEach(h=>{if(!histMap[h.usuario_id]&&h.usuario&&h.usuario!=='nan')histMap[h.usuario_id]=h.usuario;});
      }catch(e){}
    }
    allRows=usuarios.map(u=>{
      const nivel=calcNivel(u);
      const monto=calcIncentivo(u.diamantes,nivel);
      const sn=!u.usuario||u.usuario.trim()===''||u.usuario==='nan';
      const nombre=sn?(histMap[u.id_tiktok]||null):u.usuario;
      const pago=pagosMap[u.id_tiktok];
      return{
        id_tiktok:u.id_tiktok,
        usuario:nombre,
        is_historico:sn,
        contrato:u.contrato||'A000',
        nivel,
        diamantes:u.diamantes,
        monto_calculado:monto,
        pagado:pago?pago.pagado:false,
        monto_real:pago?pago.monto_real:null,
        notas:pago?pago.notas:null,
        fecha_pago:pago?pago.fecha_pago:null,
        pago_id:pago?pago.id:null,
        redirigido_agente:pago?!!pago.redirigido_agente:false,
        es_agente:IDS_SIN_TOGGLE.has(String(u.id_tiktok))
      };
    }).filter(r=>r.monto_calculado>0);
    allRows.sort((a,b)=>{
      if(a.contrato!==b.contrato)return a.contrato.localeCompare(b.contrato);
      if(a.pagado!==b.pagado)return a.pagado?1:-1;
      return b.monto_calculado-a.monto_calculado;
    });
    poblarContratos();updateStats();await updateContratoBar();renderTable();
  }catch(e){showMsg('Error: '+e.message);}
  finally{spinRefresh(false);}
}

function poblarContratos(){
  const sel=document.getElementById('contratoSelect');
  const prev=sel.value;
  sel.innerHTML='<option value="">Todos</option>';
  const cs=[...new Set(allRows.map(r=>r.contrato))].sort();
  cs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  if(prev&&cs.includes(prev))sel.value=prev;
  currentContrato=sel.value;
}

function calcNivel(u){const c=contratosMap[u.contrato];if(c&&c.nivel1_tabla3&&u.nivel>=1)return 3;return u.nivel||0;}
function calcIncentivo(diamantes,nivel){
  if(!nivel)return 0;const d=Number(diamantes)||0;let found=null;
  for(const row of incentivosTable){if(d>=row.acumulado)found=row;else break;}
  if(!found)return 0;return parseFloat(found[`nivel_${nivel}_paypal`])||0;
}

function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}

function getFiltered(){
  let rows=currentContrato?allRows.filter(r=>r.contrato===currentContrato):allRows;
  if(currentFilter==='pending')rows=rows.filter(r=>!r.pagado&&!r.redirigido_agente);
  if(currentFilter==='paid')rows=rows.filter(r=>r.pagado||r.redirigido_agente);
  return rows;
}

function updateStats(){
  const base=currentContrato?allRows.filter(r=>r.contrato===currentContrato):allRows;
  const total=base.reduce((s,r)=>s+r.monto_calculado,0);
  const pagado=base.filter(r=>r.pagado).reduce((s,r)=>s+(r.monto_real??r.monto_calculado),0);
  const np=base.filter(r=>r.pagado||r.redirigido_agente).length;
  const pct=base.length?Math.round(np/base.length*100):0;
  document.getElementById('statTotal').textContent=`$${total.toFixed(2)}`;
  document.getElementById('statPagado').textContent=`$${pagado.toFixed(2)}`;
  document.getElementById('statCount').textContent=`${np} / ${base.length}`;
  document.getElementById('statPct').textContent=`${pct}% completado`;
  document.getElementById('progressFill').style.width=`${pct}%`;
}

// Retorna cuánto hay redirigido al agente en el contrato actual
function getMontoRedirigido(contrato){
  const rows=allRows.filter(r=>r.contrato===contrato&&r.redirigido_agente);
  return rows.reduce((s,r)=>s+r.monto_calculado,0);
}

async function updateContratoBar(){
  const bar=document.getElementById('contratoBar');
  if(!currentContrato){bar.style.display='none';return;}
  bar.style.display='flex';
  document.getElementById('contratoBarTitle').textContent=currentContrato;
  const rows=allRows.filter(r=>r.contrato===currentContrato);
  const total=rows.reduce((s,r)=>s+r.monto_calculado,0);
  const pendientes=rows.filter(r=>!r.pagado&&!r.redirigido_agente).length;
  const redirigido=getMontoRedirigido(currentContrato);

  // Jalar total_final del agente desde resumen_contratos
  let agenteStr='';
  try{
    const res=await sbGet(`resumen_contratos?contrato=eq.${currentContrato}&periodo=eq.${currentPeriodo}&select=total_final,total_paypal,transferencias_recibidas&limit=1`);
    if(res&&res.length>0){
      const r=res[0];
      const sueldo=parseFloat(r.total_paypal)||0;
      const tr=parseFloat(r.transferencias_recibidas)||0;
      const tf=parseFloat(r.total_final)||0;
      if(redirigido>0){
        const totalAgente=tf+redirigido;
        agenteStr=` · Agente: $${tf.toFixed(2)} sueldo + $${redirigido.toFixed(2)} redirigido = $${totalAgente.toFixed(2)}`;
      } else {
        agenteStr=` · Agente: $${tf.toFixed(2)}${tr>0?' (incl. $'+tr.toFixed(2)+' transferencias)':''}`;
      }
    }
  }catch(e){}

  document.getElementById('contratoBarInfo').textContent=
    `${rows.length} streamers · $${total.toFixed(2)} incentivos · ${pendientes} pendientes${agenteStr}`;

  // Mostrar/ocultar botón exportar
  const hayRedir=rows.some(r=>r.redirigido_agente);
  document.getElementById('btnExportarNota').style.display=hayRedir?'inline-block':'none';

  const sueldo=sueldosMap[currentContrato];
  const badge=document.getElementById('sueldoBadge');
  if(sueldo&&sueldo.pagado){
    const fecha=new Date(sueldo.fecha_pago).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit'});
    badge.textContent=`Sueldo pagado ${fecha}${sueldo.monto_real?' · $'+sueldo.monto_real.toFixed(2):''}${sueldo.notas?' · '+sueldo.notas:''}`;
    badge.style.display='inline';
  }else{badge.style.display='none';}
}

function renderTable(){
  const rows=getFiltered();
  if(!rows.length){showMsg('Sin registros.');return;}
  const tbody=rows.map(r=>{
    const esRedir=r.redirigido_agente;
    const nombre=r.usuario
      ?(r.is_historico
          ?`${r.usuario} <span class="tag-hist">HIST</span>`
          :r.usuario)
      :`<span style="color:#555">Sin nombre (${r.id_tiktok.slice(-6)})</span>`;
    const tagRedir=esRedir?'<span class="tag-redir">→ AGENTE</span>':'';
    const monto=r.pagado
      ?`$${(r.monto_real??r.monto_calculado).toFixed(2)}`
      :`$${r.monto_calculado.toFixed(2)}`;
    const fecha=r.fecha_pago?new Date(r.fecha_pago).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';

    let accion='';
    if(r.pagado){
      accion=`<button class="btn-undo" onclick="deshacerPago('${r.id_tiktok}')">Deshacer</button>`;
    } else if(esRedir){
      accion=`<div class="accion-cell">
        <button class="btn-redir active" onclick="toggleRedirigir('${r.id_tiktok}')">→ Agente</button>
      </div>`;
    } else {
      const btnRedir=r.es_agente?'':
        `<button class="btn-redir" onclick="toggleRedirigir('${r.id_tiktok}')">→ Agente</button>`;
      accion=`<div class="accion-cell">
        <button class="btn-pagar" onclick="abrirModal('${r.id_tiktok}')">Marcar pagado</button>
        ${btnRedir}
      </div>`;
    }

    const rowClass=r.pagado?'row-paid':(esRedir?'row-redir':'');
    const userClass=r.pagado?'paid':(esRedir?'redir':'');
    const montoClass=r.pagado?'paid':(esRedir?'redir':'');

    return `<tr class="${rowClass}">
      <td><span class="td-usuario ${userClass}">${nombre}${tagRedir}</span></td>
      <td><span class="td-contrato ${r.pagado?'paid':''}">${r.contrato}</span></td>
      <td><span class="nivel-box ${r.pagado?'paid':''}">${r.nivel}</span></td>
      <td class="td-num ${r.pagado?'paid':''}">${Number(r.diamantes).toLocaleString('es-MX')}</td>
      <td class="td-monto ${montoClass}">${monto}</td>
      <td><span class="td-nota">${r.notas||''}</span></td>
      <td class="td-fecha">${fecha}</td>
      <td>${accion}</td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Usuario</th><th>Contrato</th><th>Nvl</th><th class="right">Diamantes</th><th class="right">Incentivo</th><th>Nota</th><th>Fecha</th><th></th></tr></thead>
    <tbody>${tbody}</tbody></table></div>`;
}

function showMsg(txt){document.getElementById('content').innerHTML=`<div class="status-msg">${txt}</div>`;}
function spinRefresh(on){document.getElementById('refreshBtn').classList.toggle('spinning',on);}

// ── REDIRIGIR AL AGENTE ──────────────────────────────────────────────────────
async function toggleRedirigir(id_tiktok){
  const row=allRows.find(r=>r.id_tiktok===id_tiktok);
  if(!row||row.pagado)return;
  const nuevoEstado=!row.redirigido_agente;
  try{
    const record={
      periodo:currentPeriodo,
      usuario_id:row.id_tiktok,
      usuario_nombre:row.usuario||null,
      contrato:row.contrato,
      nivel:row.nivel,
      diamantes:row.diamantes,
      monto_calculado:row.monto_calculado,
      monto_real:nuevoEstado?row.monto_calculado:null,
      notas:nuevoEstado?'Redirigido al agente':null,
      pagado:false,
      redirigido_agente:nuevoEstado,
      fecha_pago:null
    };
    const result=await sbUpsert('pagos_incentivos',record);
    const saved=Array.isArray(result)?result[0]:result;
    const idx=allRows.findIndex(r=>r.id_tiktok===id_tiktok);
    if(idx>=0){
      allRows[idx].redirigido_agente=nuevoEstado;
      allRows[idx].pago_id=saved.id;
      allRows[idx].notas=nuevoEstado?'Redirigido al agente':null;
      pagosMap[id_tiktok]=saved;
    }
    updateStats();await updateContratoBar();renderTable();
    showToast(nuevoEstado?`${row.usuario||'usuario'} → redirigido al agente`:`${row.usuario||'usuario'} → pago directo`);
  }catch(e){showToast('Error: '+e.message);}
}

// ── EXPORTAR NOTA .TXT ───────────────────────────────────────────────────────
async function exportarNota(){
  if(!currentContrato||!currentPeriodo)return;
  const rows=allRows.filter(r=>r.contrato===currentContrato);
  const redirigidos=rows.filter(r=>r.redirigido_agente);
  const directos=rows.filter(r=>!r.redirigido_agente&&!r.pagado);
  const pagadosDir=rows.filter(r=>r.pagado&&!r.redirigido_agente);

  // Mes legible
  const d=new Date(currentPeriodo+'T12:00:00');
  const mes=d.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  const mesCap=mes.charAt(0).toUpperCase()+mes.slice(1);

  // Sueldo del agente
  const sueldoReg=sueldosMap[currentContrato];
  let sueldoBase=0;
  try{
    const res=await sbGet(`resumen_contratos?contrato=eq.${currentContrato}&periodo=eq.${currentPeriodo}&select=total_final&limit=1`);
    if(res&&res.length>0)sueldoBase=parseFloat(res[0].total_final)||0;
  }catch(e){}
  if(sueldoReg&&sueldoReg.monto_real)sueldoBase=parseFloat(sueldoReg.monto_real)||sueldoBase;

  const montoRedir=redirigidos.reduce((s,r)=>s+r.monto_calculado,0);
  const totalAgente=sueldoBase+montoRedir;
  const montoDirecto=(directos.concat(pagadosDir)).reduce((s,r)=>s+r.monto_calculado,0);
  const totalAngel=totalAgente+montoDirecto;

  const pad=(str,n)=>{const s=String(str);return s+' '.repeat(Math.max(0,n-s.length));};
  const W=42;

  let txt=`NOTA ACTUALIZADA — ${currentContrato} — ${mesCap}\n`;
  txt+=`${'═'.repeat(W)}\n`;
  txt+=`${pad('Sueldo base:',28)}$${sueldoBase.toFixed(2)}\n`;

  if(redirigidos.length>0){
    txt+=`\nIncentivos redirigidos al agente:\n`;
    redirigidos.forEach(r=>{
      const nom=r.usuario||`[${r.id_tiktok.slice(-8)}]`;
      txt+=`  ${pad(nom+':',26)}$${r.monto_calculado.toFixed(2)}\n`;
    });
  }

  txt+=`${'─'.repeat(W)}\n`;
  txt+=`${pad('TOTAL A PAGAR AL AGENTE:',28)}$${totalAgente.toFixed(2)}\n`;

  if(directos.length>0||pagadosDir.length>0){
    txt+=`\nPagos directos Angel → jugadores:\n`;
    directos.concat(pagadosDir).forEach(r=>{
      const nom=r.usuario||`[${r.id_tiktok.slice(-8)}]`;
      txt+=`  ${pad(nom+':',26)}$${r.monto_calculado.toFixed(2)}\n`;
    });
  }

  txt+=`${'─'.repeat(W)}\n`;
  txt+=`${pad('TOTAL ANGEL DESEMBOLSA:',28)}$${totalAngel.toFixed(2)}\n`;
  txt+=`${'═'.repeat(W)}\n`;
  txt+=`\nGenerado: ${new Date().toLocaleString('es-MX')}\n`;

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`nota_${currentContrato}_${currentPeriodo}.txt`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Nota exportada: ${currentContrato} ${currentPeriodo}`);
}

// ── MODAL PAGO INDIVIDUAL ────────────────────────────────────────────────────
function abrirModal(id_tiktok){
  const row=allRows.find(r=>r.id_tiktok===id_tiktok);if(!row)return;
  modalRow=row;modalMode='individual';
  document.getElementById('modalTitle').textContent='CONFIRMAR PAGO';
  document.getElementById('modalUserName').textContent=row.usuario||`[${row.id_tiktok.slice(-8)}]`;
  document.getElementById('modalInfo').style.display='grid';
  document.getElementById('modalContrato').textContent=row.contrato;
  document.getElementById('modalNivel').textContent=row.nivel;
  document.getElementById('modalDiamantes').textContent=Number(row.diamantes).toLocaleString('es-MX');
  document.getElementById('modalCalculado').textContent=`$${row.monto_calculado.toFixed(2)}`;
  document.getElementById('inputMonto').value=row.monto_calculado.toFixed(2);
  document.getElementById('inputNota').value='';
  document.getElementById('btnConfirm').disabled=false;
  document.getElementById('btnConfirm').textContent='Confirmar pago';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('inputMonto').focus(),150);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');modalRow=null;}

async function confirmarPago(){
  if(modalMode==='contrato'){await confirmarPagoContrato();return;}
  if(!modalRow)return;
  const monto=parseFloat(document.getElementById('inputMonto').value)||0;
  const nota=document.getElementById('inputNota').value.trim();
  const btn=document.getElementById('btnConfirm');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    const record={periodo:currentPeriodo,usuario_id:modalRow.id_tiktok,usuario_nombre:modalRow.usuario||null,contrato:modalRow.contrato,nivel:modalRow.nivel,diamantes:modalRow.diamantes,monto_calculado:modalRow.monto_calculado,monto_real:monto,notas:nota||null,pagado:true,redirigido_agente:false,fecha_pago:new Date().toISOString()};
    const result=await sbUpsert('pagos_incentivos',record);
    const saved=Array.isArray(result)?result[0]:result;
    const idx=allRows.findIndex(r=>r.id_tiktok===modalRow.id_tiktok);
    if(idx>=0){allRows[idx].pagado=true;allRows[idx].redirigido_agente=false;allRows[idx].monto_real=monto;allRows[idx].notas=nota||null;allRows[idx].fecha_pago=saved.fecha_pago;allRows[idx].pago_id=saved.id;pagosMap[modalRow.id_tiktok]=saved;}
    closeModal();updateStats();await updateContratoBar();renderTable();
    showToast(`Pagado: ${modalRow.usuario||'usuario'} — $${monto.toFixed(2)}`);
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Confirmar pago';}
}

function pagarContratoCompleto(){
  if(!currentContrato)return;
  const pendientes=allRows.filter(r=>r.contrato===currentContrato&&!r.pagado&&!r.redirigido_agente);
  if(!pendientes.length){showToast('No hay pendientes en este contrato.');return;}
  const totalCalc=pendientes.reduce((s,r)=>s+r.monto_calculado,0);
  modalMode='contrato';modalRow=null;
  document.getElementById('modalTitle').textContent=`PAGAR CONTRATO ${currentContrato}`;
  document.getElementById('modalUserName').textContent=`${pendientes.length} streamers pendientes`;
  document.getElementById('modalInfo').style.display='none';
  document.getElementById('inputMonto').value=totalCalc.toFixed(2);
  document.getElementById('inputNota').value='';
  document.getElementById('btnConfirm').disabled=false;
  document.getElementById('btnConfirm').textContent='Confirmar pago';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('inputMonto').focus(),150);
}

async function confirmarPagoContrato(){
  const montoTotal=parseFloat(document.getElementById('inputMonto').value)||0;
  const nota=document.getElementById('inputNota').value.trim();
  const btn=document.getElementById('btnConfirm');
  btn.disabled=true;btn.textContent='Guardando...';
  const pendientes=allRows.filter(r=>r.contrato===currentContrato&&!r.pagado&&!r.redirigido_agente);
  const totalCalc=pendientes.reduce((s,r)=>s+r.monto_calculado,0);
  const ahora=new Date().toISOString();
  try{
    for(const row of pendientes){
      const prop=totalCalc>0?row.monto_calculado/totalCalc:1/pendientes.length;
      const montoRow=Math.round(montoTotal*prop*100)/100;
      const record={periodo:currentPeriodo,usuario_id:row.id_tiktok,usuario_nombre:row.usuario||null,contrato:row.contrato,nivel:row.nivel,diamantes:row.diamantes,monto_calculado:row.monto_calculado,monto_real:montoRow,notas:nota||null,pagado:true,redirigido_agente:false,fecha_pago:ahora};
      const result=await sbUpsert('pagos_incentivos',record);
      const saved=Array.isArray(result)?result[0]:result;
      const idx=allRows.findIndex(r=>r.id_tiktok===row.id_tiktok);
      if(idx>=0){allRows[idx].pagado=true;allRows[idx].redirigido_agente=false;allRows[idx].monto_real=montoRow;allRows[idx].notas=nota||null;allRows[idx].fecha_pago=ahora;allRows[idx].pago_id=saved.id;pagosMap[row.id_tiktok]=saved;}
    }
    closeModal();updateStats();await updateContratoBar();renderTable();
    showToast(`${pendientes.length} streamers marcados — $${montoTotal.toFixed(2)}`);
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Confirmar pago';}
}

async function deshacerPago(id_tiktok){
  const row=allRows.find(r=>r.id_tiktok===id_tiktok);if(!row||!row.pago_id)return;
  try{
    await sbPatch('pagos_incentivos',row.pago_id,{pagado:false,redirigido_agente:false,fecha_pago:null,notas:null});
    const idx=allRows.findIndex(r=>r.id_tiktok===id_tiktok);
    if(idx>=0){allRows[idx].pagado=false;allRows[idx].redirigido_agente=false;allRows[idx].fecha_pago=null;allRows[idx].notas=null;}
    updateStats();await updateContratoBar();renderTable();showToast('Pago deshecho');
  }catch(e){showToast('Error: '+e.message);}
}

function abrirModalSueldo(){
  if(!currentContrato)return;
  const sueldo=sueldosMap[currentContrato];
  document.getElementById('sueldoContratoNombre').textContent=currentContrato;
  document.getElementById('sueldoMonto').value=sueldo?(sueldo.monto_real||''):'';
  document.getElementById('sueldoNota').value=sueldo?(sueldo.notas||''):'';

  document.getElementById('btnConfirmSueldo').textContent='Registrar';
  document.getElementById('modalSueldoOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('sueldoMonto').focus(),150);
}
function closeModalSueldo(){document.getElementById('modalSueldoOverlay').classList.remove('active');}
async function confirmarSueldo(){
  const monto=parseFloat(document.getElementById('sueldoMonto').value)||0;
  const nota=document.getElementById('sueldoNota').value.trim();
  const btn=document.getElementById('btnConfirmSueldo');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    const record={periodo:currentPeriodo,usuario_id:`SUELDO_${currentContrato}`,usuario_nombre:`Sueldo ${currentContrato}`,contrato:currentContrato,nivel:0,diamantes:0,monto_calculado:0,monto_real:monto,notas:nota||null,pagado:true,redirigido_agente:false,fecha_pago:new Date().toISOString()};
    const result=await sbUpsert('pagos_incentivos',record);

    closeModalSueldo();await updateContratoBar();
    showToast(`Sueldo ${currentContrato} registrado — $${monto.toFixed(2)}`);
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Registrar';}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
